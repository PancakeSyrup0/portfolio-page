<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam | Interactive Portfolio</title>
    <style>
        /* --- CUSTOM FONT SETUP --- */
        @font-face {
            font-family: 'AdamCustomFont';
            src: url('YourFontFile.woff2') format('woff2'); /* CHANGE THIS LINE to your exact font file name */
            font-weight: normal;
            font-style: normal;
        }

        /* --- THEME VARIABLES --- */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --btn-border: #ffffff;
            --btn-hover-bg: #ffffff;
            --btn-hover-text: #000000;
            --modal-overlay: rgba(0, 0, 0, 0.6);
            --modal-bg: rgba(255, 255, 255, 0.08);
            --modal-border: rgba(255, 255, 255, 0.15);
            --title-border: #333333;
            --helper-text: #aaaaaa;
        }

        body.light-mode {
            --bg-color: #f4f4f5;
            --text-color: #111827;
            --btn-border: #111827;
            --btn-hover-bg: #111827;
            --btn-hover-text: #ffffff;
            --modal-overlay: rgba(255, 255, 255, 0.7);
            --modal-bg: rgba(0, 0, 0, 0.05);
            --modal-border: rgba(0, 0, 0, 0.2);
            --title-border: #cccccc;
            --helper-text: #555555;
        }

        /* Base Styles */
        body { margin: 0; overflow: hidden; background-color: var(--bg-color); color: var(--text-color); font-family: 'AdamCustomFont', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.5s ease, color 0.5s ease; }
        
        #theme-toggle {
            position: absolute; top: 20px; left: 20px; z-index: 60;
            background: rgba(128, 128, 128, 0.2); border: 1px solid var(--modal-border); color: var(--text-color);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #theme-toggle:hover { background: var(--text-color); color: var(--bg-color); }

        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 1s ease-in-out, visibility 1s, background-color 0.5s ease;
        }

        #intro-video { width: 80%; max-width: 600px; pointer-events: none; }

        .music-text { font-size: 1.2rem; color: var(--text-color); opacity: 0; animation: fadeIn 0.5s ease-in 1.5s forwards; margin-top: 15px;}
        @keyframes fadeIn { to { opacity: 1; } }
        
        #enter-btn {
            margin-top: 20px; padding: 12px 30px; font-size: 1.2rem;
            background-color: transparent; color: var(--text-color); border: 2px solid var(--btn-border); border-radius: 8px;
            cursor: pointer; font-weight: bold;
            opacity: 0; animation: fadeIn 0.5s ease-in 2s forwards; transition: all 0.3s ease;
        }

        #enter-btn:hover { background-color: var(--btn-hover-bg); color: var(--btn-hover-text); }
        .fade-out { opacity: 0; visibility: hidden; }

        #helper-text { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none; color: var(--helper-text); z-index: 10; font-family: 'AdamCustomFont', sans-serif;}

        #modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--modal-overlay); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            z-index: 50; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, background 0.5s ease;
        }
        #modal-overlay.active { opacity: 1; visibility: visible; }

        #modal-content {
            background: var(--modal-bg); border: 1px solid var(--modal-border);
            border-radius: 15px; padding: 40px; width: 85%; max-width: 500px; text-align: left;
            position: relative; transform: translateY(20px); transition: transform 0.3s ease, background 0.5s ease, border 0.5s ease;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
        }
        #modal-overlay.active #modal-content { transform: translateY(0); }

        #close-btn {
            position: absolute; top: 15px; right: 20px;
            background: none; border: none; color: var(--text-color);
            font-size: 1.5rem; cursor: pointer; transition: color 0.2s;
        }
        #close-btn:hover { opacity: 0.5; }
        
        #modal-title { margin-top: 0; font-size: 2rem; border-bottom: 2px solid var(--title-border); padding-bottom: 10px; color: var(--text-color); transition: border 0.5s ease; }
        .project-item { margin-top: 20px; }
        .project-item h3 { margin-bottom: 5px; color: var(--text-color); }
        .project-item p { line-height: 1.5; color: var(--text-color); opacity: 0.8; }

        #spotify-container {
            position: absolute; bottom: 20px; right: 20px; width: 300px; height: 80px; z-index: 40;
            opacity: 0.5; transition: opacity 0.3s;
        }
        #spotify-container:hover { opacity: 1; }
        
        @media (max-width: 600px) {
            #spotify-container { width: calc(100% - 40px); left: 20px; right: 20px; bottom: 20px; }
            #helper-text { bottom: 120px; }
        }
    </style>
</head>
<body>

    <button id="theme-toggle">☀️ Light Mode</button>

    <div id="intro-screen">
        <video id="intro-video" src="intro.webm" autoplay muted playsinline loop></video>
        <p class="music-text">(also enjoy the music)</p>
        <button id="enter-btn">Enter Portfolio</button>
    </div>

    <div id="spotify-container">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/4PhyPC1SfVCV4w2Tx6jZjx?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <div id="helper-text">Drag to rotate • Tap or click a face to explore</div>

    <div id="modal-overlay">
        <div id="modal-content">
            <button id="close-btn">×</button>
            <h2 id="modal-title">Skill Title</h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const portfolioData = [
            { title: "App Development", content: "<div class='project-item'><h3>Roomio</h3><p>Details about Roomio...</p></div>" },
            { title: "Design", content: "<div class='project-item'><h3>@pancakesyrup101</h3><p>Details about design work...</p></div>" },
            { title: "Video Editing", content: "<div class='project-item'><h3>@pancakesyrup101</h3><p>Details about video projects...</p></div>" },
            { title: "Game Development", content: "<div class='project-item'><h3>Tug of Love</h3><p>Details about Tug of Love...</p></div>" },
            { title: "Full-Stack Web Dev", content: "<div class='project-item'><h3>Magis FLOW</h3><p>Details about Magis FLOW...</p></div>" },
            { title: "Contact Me", content: "<div class='project-item'><h3>Let's Connect</h3><p>Email: adamjijo@gmail.com</p></div>" }
        ];

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
        renderer.setPixelRatio(window.devicePixelRatio); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- UPDATED WEBM VIDEO & SHADER LOGIC ---
        const htmlVideoElements = []; 
        const coreVideos = ['app_dev.webm', 'design.webm', 'video_editing.webm', 'game_dev.webm', 'web_dev.webm', 'contact.webm'];
        
        let isDarkMode = true;
        let targetInvertValue = 0.0; 

        function createVideoMaterial(videoFilename) {
            const video = document.createElement('video');
            video.src = videoFilename;
            video.loop = true;
            video.muted = true;
            video.setAttribute('playsinline', ''); 
            video.preload = 'auto'; // Forces browser buffer for smoother playback
            
            htmlVideoElements.push(video);

            const videoTexture = new THREE.VideoTexture(video);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;

            const material = new THREE.MeshBasicMaterial({ 
                map: videoTexture,
                transparent: true, 
                opacity: 1.0,
                side: THREE.DoubleSide 
            });

            material.userData.uInvert = { value: 0.0 };
            
            material.onBeforeCompile = (shader) => {
                shader.uniforms.uInvert = material.userData.uInvert;
                shader.fragmentShader = `
                    uniform float uInvert;
                    ${shader.fragmentShader}
                `.replace(
                    '#include <map_fragment>',
                    `#include <map_fragment>
                    diffuseColor.rgb = mix(diffuseColor.rgb, 1.0 - diffuseColor.rgb, uInvert);
                    `
                );
            };

            return material;
        }

        const materials = coreVideos.map(vid => createVideoMaterial(vid));
        
        // --- 3D EXPLODING CUBE LOGIC ---
        const cubeGroup = new THREE.Group();
        const planeGeometry = new THREE.PlaneGeometry(2, 2);
        const planeMeshes = [];

        const planesData = [
            { pos: [1, 0, 0], rot: [0, Math.PI / 2, 0] },     
            { pos: [-1, 0, 0], rot: [0, -Math.PI / 2, 0] },   
            { pos: [0, 1, 0], rot: [-Math.PI / 2, 0, 0] },    
            { pos: [0, -1, 0], rot: [Math.PI / 2, 0, 0] },    
            { pos: [0, 0, 1], rot: [0, 0, 0] },               
            { pos: [0, 0, -1], rot: [0, Math.PI, 0] }         
        ];

        planesData.forEach((data, index) => {
            const mesh = new THREE.Mesh(planeGeometry, materials[index]);
            mesh.position.set(...data.pos);
            mesh.rotation.set(...data.rot);
            
            mesh.userData = { 
                index: index, 
                basePos: new THREE.Vector3(...data.pos),
                hoverPos: new THREE.Vector3(...data.pos).multiplyScalar(1.25) 
            };
            
            cubeGroup.add(mesh);
            planeMeshes.push(mesh);
        });

        scene.add(cubeGroup);
        
        camera.position.z = window.innerWidth < 768 ? 9 : 6; 

        // --- INTERACTIVE SPACE STARS LOGIC ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 3000;
        const posArray = new Float32Array(starCount * 3);
        
        for(let i = 0; i < starCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 120;
        }
        
        starGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starMaterial = new THREE.PointsMaterial({ size: 0.035, color: 0xffffff, transparent: true, opacity: 0.8 });
        const starMesh = new THREE.Points(starGeometry, starMaterial);
        scene.add(starMesh);

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');
            themeToggle.innerText = isDarkMode ? "☀️ Light Mode" : "🌙 Dark Mode";
            scene.fog.color.setHex(isDarkMode ? 0x000000 : 0xf4f4f5);
            starMaterial.color.setHex(isDarkMode ? 0xffffff : 0x000000);

            targetInvertValue = isDarkMode ? 0.0 : 1.0;
        });

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false; 
        controls.enablePan = false; 

        const enterBtn = document.getElementById('enter-btn');
        const introScreen = document.getElementById('intro-screen');

        enterBtn.addEventListener('click', () => {
            htmlVideoElements.forEach(vid => vid.play());
            introScreen.classList.add('fade-out');
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        const modalOverlay = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const closeBtn = document.getElementById('close-btn');

        function closeModal() { modalOverlay.classList.remove('active'); }
        closeBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

        let pointerDownPos = new THREE.Vector2();
        window.addEventListener('pointerdown', (event) => {
            pointerDownPos.x = event.clientX;
            pointerDownPos.y = event.clientY;
        });

        window.addEventListener('pointerup', (event) => {
            if (modalOverlay.classList.contains('active') || !introScreen.classList.contains('fade-out')) return;

            const distanceMoved = Math.hypot(event.clientX - pointerDownPos.x, event.clientY - pointerDownPos.y);
            if (distanceMoved > 5) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cubeGroup.children);

            if (intersects.length > 0) {
                const faceIndex = intersects[0].object.userData.index;
                modalTitle.innerText = portfolioData[faceIndex].title;
                modalBody.innerHTML = portfolioData[faceIndex].content;
                modalOverlay.classList.add('active');
            }
        });

        let targetStarRotX = 0;
        let targetStarRotY = 0;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            targetStarRotY = mouse.x * 0.2; 
            targetStarRotX = mouse.y * 0.2; 
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.position.z = window.innerWidth < 768 ? 9 : 6; 
        });

        const fadeSpeed = 0.05; 
        const popSpeed = 0.15; 
        let currentlyHoveredFace = null;

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            starMesh.rotation.x += (targetStarRotX - starMesh.rotation.x) * 0.05;
            starMesh.rotation.y += (targetStarRotY - starMesh.rotation.y) * 0.05;
            starMesh.rotation.z += 0.0001; 

            if (introScreen.classList.contains('fade-out') && !modalOverlay.classList.contains('active')) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(cubeGroup.children);

                if (intersects.length > 0) {
                    currentlyHoveredFace = intersects[0].object.userData.index;
                } else {
                    currentlyHoveredFace = null;
                }
            } else {
                currentlyHoveredFace = null;
            }

            // --- ANIMATE THE PLANES & SHADERS ---
            planeMeshes.forEach((mesh) => {
                if (mesh.userData.index === currentlyHoveredFace) {
                    mesh.material.opacity = Math.max(0.6, mesh.material.opacity - fadeSpeed);
                    mesh.position.lerp(mesh.userData.hoverPos, popSpeed);
                } else {
                    mesh.material.opacity = Math.min(1.0, mesh.material.opacity + fadeSpeed);
                    mesh.position.lerp(mesh.userData.basePos, popSpeed);
                }

                if(mesh.material.userData.uInvert) {
                    mesh.material.userData.uInvert.value += (targetInvertValue - mesh.material.userData.uInvert.value) * 0.1;
                }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
