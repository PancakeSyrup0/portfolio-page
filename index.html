<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam | Interactive Portfolio</title>
    <style>
        /* --- CUSTOM FONT SETUP --- */
        @font-face {
            font-family: 'AdamCustomFont';
            src: url('PPFraktionMono-Regular.woff2') format('woff2'); 
            font-weight: normal;
            font-style: normal;
        }

        /* --- THEME VARIABLES --- */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --btn-border: #ffffff;
            --btn-hover-bg: #ffffff;
            --btn-hover-text: #000000;
            --glass-bg: rgba(10, 10, 10, 0.65);
            --glass-border: rgba(255, 255, 255, 0.15);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-hover: rgba(255, 255, 255, 0.1);
            --title-border: rgba(255, 255, 255, 0.3);
            --helper-text: #aaaaaa;
        }

        body.light-mode {
            --bg-color: #f2f0e6; 
            --text-color: #3d3b38; 
            --btn-border: #3d3b38;
            --btn-hover-bg: #3d3b38;
            --btn-hover-text: #f2f0e6;
            --glass-bg: rgba(242, 240, 230, 0.75);
            --glass-border: rgba(61, 59, 56, 0.15);
            --card-bg: rgba(61, 59, 56, 0.04);
            --card-hover: rgba(61, 59, 56, 0.08);
            --title-border: rgba(61, 59, 56, 0.2);
            --helper-text: #706e69;
        }

        /* Base Styles */
        body { margin: 0; overflow: hidden; background-color: var(--bg-color); color: var(--text-color); font-family: 'AdamCustomFont', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.5s ease, color 0.5s ease; }
        
        #theme-toggle {
            position: absolute; top: 20px; left: 20px; z-index: 60;
            background: rgba(128, 128, 128, 0.2); border: 1px solid var(--glass-border); color: var(--text-color);
            padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        #theme-toggle:hover { background: var(--text-color); color: var(--bg-color); }

        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: opacity 1s ease-in-out, visibility 1s, background-color 0.5s ease;
        }

        #intro-video { width: 80%; max-width: 600px; pointer-events: none; }

        .music-text { font-size: 1.2rem; color: var(--text-color); opacity: 0; animation: fadeIn 0.5s ease-in 1.5s forwards; margin-top: 15px;}
        @keyframes fadeIn { to { opacity: 1; } }
        
        #enter-btn {
            margin-top: 20px; padding: 12px 30px; font-size: 1.2rem;
            background-color: transparent; color: var(--text-color); border: 2px solid var(--btn-border); border-radius: 8px;
            cursor: pointer; font-weight: bold;
            opacity: 0; animation: fadeIn 0.5s ease-in 2s forwards; transition: all 0.3s ease;
        }
        #enter-btn:hover { background-color: var(--btn-hover-bg); color: var(--btn-hover-text); }
        .fade-out { opacity: 0; visibility: hidden; }

        #helper-text { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none; color: var(--helper-text); z-index: 10; }

        #spotify-container {
            position: absolute; bottom: 20px; right: 20px; width: 300px; height: 80px; z-index: 40;
            opacity: 0.5; transition: opacity 0.3s;
        }
        #spotify-container:hover { opacity: 1; }
        
        @media (max-width: 600px) {
            #spotify-container { width: calc(100% - 40px); left: 20px; right: 20px; bottom: 20px; }
            #helper-text { bottom: 120px; }
        }

        /* --- FULL-PAGE GLASS SHEET --- */
        #glass-panel {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100dvh;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            z-index: 200; 
            pointer-events: none; 
            transform: translateY(100%); 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.3, 1), background 0.5s ease;
            overflow-y: auto;
            box-sizing: border-box;
            padding: 80px 5% 60px 5%;
        }

        #glass-panel.active {
            transform: translateY(0); 
            pointer-events: all; 
        }

        #close-btn {
            position: fixed; top: 25px; right: 35px;
            background: none; border: none; color: var(--text-color);
            font-size: 3rem; cursor: pointer; transition: transform 0.2s ease, color 0.2s ease;
            line-height: 0.5; padding: 10px; z-index: 210;
        }
        #close-btn:hover { transform: scale(1.2) rotate(90deg); color: #ff5555; }

        .glass-container { max-width: 1100px; margin: 0 auto; }

        .glass-title {
            font-size: 3.5rem; margin-top: 0; margin-bottom: 40px; text-transform: uppercase; 
            letter-spacing: 3px; border-bottom: 2px solid var(--title-border); padding-bottom: 15px;
        }

        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

        .project-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            padding: 30px; border-radius: 15px; transition: transform 0.3s ease, background 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .project-card:hover { transform: translateY(-8px); background: var(--card-hover); }

        .project-card h3 { margin-top: 0; font-size: 1.8rem; margin-bottom: 15px; }
        .project-card p { line-height: 1.6; opacity: 0.9; font-size: 1.1rem; }
        
        /* Updated Button Spacing for multiple links */
        .project-card a { display: inline-block; margin-top: 15px; margin-right: 10px; color: var(--text-color); text-decoration: none; border: 1px solid var(--text-color); padding: 8px 16px; border-radius: 5px; transition: all 0.2s;}
        .project-card a:hover { background: var(--text-color); color: var(--bg-color); }
    </style>
</head>
<body>

    <button id="theme-toggle">☀️ Light Mode</button>

    <div id="intro-screen">
        <video id="intro-video" src="intro.webm" autoplay muted playsinline loop></video>
        <p class="music-text">(also enjoy the music)</p>
        <button id="enter-btn">Enter Portfolio</button>
    </div>

    <div id="spotify-container">
        <iframe style="border-radius:12px" src="https://open.spotify.com/embed/playlist/4PhyPC1SfVCV4w2Tx6jZjx?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <div id="helper-text">Drag to rotate • Tap or click a face to explore</div>

    <div id="glass-panel">
        <button id="close-btn">×</button>
        <div class="glass-container" id="glass-content">
            </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- UPGRADED PORTFOLIO DATA WITH HTML PAGE LAYOUTS ---
        const portfolioData = [
            { 
                content: `
                    <h2 class="glass-title">App Development</h2>
                    <div class="project-grid">
                        <div class="project-card">
                            <h3>Roomio</h3>
                            <p>A mobile application designed to simplify the process of finding compatible roommates. Built with a focus on clean UI/UX and seamless matching algorithms.</p>
                            <a href="#" target="_blank">View Project</a>
                        </div>
                    </div>` 
            },
            { 
                content: `
                    <h2 class="glass-title">Design</h2>
                    <div class="project-grid">
                        <div class="project-card">
                            <h3>@pancakesyrup101</h3>
                            <p>A collection of advanced design projects and visual experiments.</p>
                            <a href="https://www.instagram.com/pancakesyrup101/" target="_blank">Instagram</a>
                            <a href="https://www.youtube.com/@pancakesyruplol" target="_blank">YouTube</a>
                        </div>
                    </div>` 
            },
            { 
                content: `
                    <h2 class="glass-title">Video Editing</h2>
                    <div class="project-grid">
                        <div class="project-card">
                            <h3>@pancakesyrup101</h3>
                            <p>A collection of advanced video editing projects, showcasing motion graphics, precise cutting, and dynamic pacing.</p>
                            <a href="https://www.instagram.com/pancakesyrup101/" target="_blank">Instagram</a>
                            <a href="https://www.youtube.com/@pancakesyruplol" target="_blank">YouTube</a>
                        </div>
                    </div>` 
            },
            { 
                content: `
                    <h2 class="glass-title">Game Development</h2>
                    <div class="project-grid">
                        <div class="project-card">
                            <h3>Procedural Dungeon Generator</h3>
                            <p>Created in Godot 4. This tool dynamically generates infinite, unique dungeon layouts using complex procedural algorithms.</p>
                            <a href="https://github.com/PancakeSyrup0/proc_gen_godot" target="_blank">View Code</a>
                        </div>
                        <div class="project-card">
                            <h3>optiTBB (Turn-Based Battle Simulator)</h3>
                            <p>A lightweight, terminal-based RPG battle simulator written entirely in C, focusing on memory management and pure logic.</p>
                            <a href="https://github.com/PancakeSyrup0/optiTBB1.0" target="_blank">View Source</a>
                        </div>
                        <div class="project-card">
                            <h3>Tug of Love</h3>
                            <p>A silly game my brother and I threw together in like 10 minutes. Pure chaotic fun.</p>
                            <a href="https://github.com/PancakeSyrup0/tug-of-love" target="_blank">GitHub</a>
                            <a href="https://pancakesyrup0.itch.io/tug-of-love" target="_blank">Play on itch.io</a>
                        </div>
                    </div>` 
            },
            { 
                content: `
                    <h2 class="glass-title">Web & System Dev</h2>
                    <div class="project-grid">
                        <div class="project-card">
                            <h3>Magis FLOW (Faculty Lunch and Ordering Window)</h3>
                            <p>A web-based system built for St. Joseph's University, Bangalore. It streamlines cafeteria traffic by allowing students to pre-order meals seamlessly.</p>
                            <a href="https://github.com/PancakeSyrup0/Magis-FLOW" target="_blank">GitHub</a>
                            <a href="https://magis-flow.onrender.com/" target="_blank">Live Site</a>
                        </div>
                        <div class="project-card">
                            <h3>Custom Hyprland Dotfiles</h3>
                            <p>Developed highly customized and riced dotfiles for Arch Linux using the Hyprland Wayland compositor. Features advanced workflow automation and aesthetic consistency.</p>
                            <a href="https://github.com/PancakeSyrup0/hypr-dotfiles-neongenesis" target="_blank">View GitHub Repo</a>
                        </div>
                        <div class="project-card">
                            <h3>NoBroker Python Scraper</h3>
                            <p>An automated web scraper built in Python to intelligently track and compile apartment listings from NoBroker to bypass manual searching.</p>
                            <a href="#" target="_blank">View Script</a>
                        </div>
                        <div class="project-card">
                            <h3>Node Graph Social Network</h3>
                            <p>An open-source social network project that completely visually re-imagines mutual connections as an interactive node graph.</p>
                            <a href="#" target="_blank">View Documentation</a>
                        </div>
                    </div>` 
            },
            { 
                content: `
                    <h2 class="glass-title">Comm Link</h2>
                    <div class="project-grid">
                        <div class="project-card">
                            <h3>Let's Connect</h3>
                            <p>If you want to discuss AI internships, collaborative projects, or just talk code, reach out below.</p>
                            <a href="mailto:adamjijo@gmail.com">Email</a>
                            <a href="https://www.linkedin.com/in/adamangelo/" target="_blank">LinkedIn</a>
                            <a href="https://www.instagram.com/adamangelooo/" target="_blank">Instagram</a>
                        </div>
                        <div class="project-card">
                            <h3>Resume</h3>
                            <p>Download my latest CV detailing my experience with full-stack development, Python, and Linux systems.</p>
                            <a href="https://chocolate-ediva-52.tiiny.site/" target="_blank">View Resume</a>
                        </div>
                    </div>` 
            }
        ];

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.015); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
        renderer.setPixelRatio(window.devicePixelRatio); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const htmlVideoElements = []; 
        const coreVideos = ['app_dev.webm', 'design.webm', 'video_editing.webm', 'game_dev.webm', 'web_dev.webm', 'contact.webm'];
        
        let isDarkMode = true;

        function createVideoMaterial(videoFilename) {
            const video = document.createElement('video');
            video.src = videoFilename;
            video.loop = true;
            video.muted = true;
            video.setAttribute('playsinline', ''); 
            video.preload = 'auto';
            
            htmlVideoElements.push(video);

            const videoTexture = new THREE.VideoTexture(video);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;

            const material = new THREE.MeshBasicMaterial({ 
                map: videoTexture,
                transparent: true, 
                opacity: 1.0,
                side: THREE.DoubleSide 
            });

            material.userData.uInvert = { value: 0.0 };
            
            material.onBeforeCompile = (shader) => {
                shader.uniforms.uInvert = material.userData.uInvert;
                shader.fragmentShader = `
                    uniform float uInvert;
                    ${shader.fragmentShader}
                `.replace(
                    '#include <map_fragment>',
                    `#include <map_fragment>
                    diffuseColor.rgb = mix(diffuseColor.rgb, 1.0 - diffuseColor.rgb, uInvert);
                    `
                );
            };

            return material;
        }

        const materials = coreVideos.map(vid => createVideoMaterial(vid));
        
        const cubeGroup = new THREE.Group();
        
        const coreGeometry = new THREE.BoxGeometry(1.98, 1.98, 1.98); 
        const coreMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
        cubeGroup.add(coreMesh);

        const planeGeometry = new THREE.PlaneGeometry(2, 2);
        const planeMeshes = [];

        const planesData = [
            { pos: [1, 0, 0], rot: [0, Math.PI / 2, 0] },     
            { pos: [-1, 0, 0], rot: [0, -Math.PI / 2, 0] },   
            { pos: [0, 1, 0], rot: [-Math.PI / 2, 0, 0] },    
            { pos: [0, -1, 0], rot: [Math.PI / 2, 0, 0] },    
            { pos: [0, 0, 1], rot: [0, 0, 0] },               
            { pos: [0, 0, -1], rot: [0, Math.PI, 0] }         
        ];

        planesData.forEach((data, index) => {
            const mesh = new THREE.Mesh(planeGeometry, materials[index]);
            mesh.position.set(...data.pos);
            mesh.rotation.set(...data.rot);
            mesh.userData = { 
                index: index, 
                basePos: new THREE.Vector3(...data.pos),
                hoverPos: new THREE.Vector3(...data.pos).multiplyScalar(1.25) 
            };
            cubeGroup.add(mesh);
            planeMeshes.push(mesh);
        });

        scene.add(cubeGroup);
        camera.position.z = window.innerWidth < 768 ? 9 : 6; 

        const starGeometry = new THREE.BufferGeometry();
        const starCount = 3000;
        const posArray = new Float32Array(starCount * 3);
        for(let i = 0; i < starCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 120; }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starMaterial = new THREE.PointsMaterial({ size: 0.035, color: 0xffffff, transparent: true, opacity: 0.8 });
        const starMesh = new THREE.Points(starGeometry, starMaterial);
        scene.add(starMesh);

        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');
            themeToggle.innerText = isDarkMode ? "☀️ Light Mode" : "🌙 Dark Mode";
            
            scene.fog.color.setHex(isDarkMode ? 0x000000 : 0xf2f0e6);
            starMaterial.color.setHex(isDarkMode ? 0xffffff : 0x3d3b38);
            
            coreMaterial.color.setHex(isDarkMode ? 0x000000 : 0x3d3b38); 
        });

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false; 
        controls.enablePan = false; 

        const enterBtn = document.getElementById('enter-btn');
        const introScreen = document.getElementById('intro-screen');

        enterBtn.addEventListener('click', () => {
            htmlVideoElements.forEach(vid => vid.play());
            introScreen.classList.add('fade-out');
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        const glassPanel = document.getElementById('glass-panel');
        const glassContent = document.getElementById('glass-content');
        const closeBtn = document.getElementById('close-btn');

        function closeGlass() { glassPanel.classList.remove('active'); }
        closeBtn.addEventListener('click', closeGlass);
        
        glassPanel.addEventListener('click', (e) => { 
            if (e.target === glassPanel || e.target.classList.contains('glass-container')) closeGlass(); 
        });

        let pointerDownPos = new THREE.Vector2();
        window.addEventListener('pointerdown', (event) => {
            pointerDownPos.x = event.clientX;
            pointerDownPos.y = event.clientY;
        });

        window.addEventListener('pointerup', (event) => {
            if (glassPanel.classList.contains('active') || !introScreen.classList.contains('fade-out')) return;

            const distanceMoved = Math.hypot(event.clientX - pointerDownPos.x, event.clientY - pointerDownPos.y);
            if (distanceMoved > 15) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planeMeshes);

            if (intersects.length > 0) {
                const faceIndex = intersects[0].object.userData.index;
                glassContent.innerHTML = portfolioData[faceIndex].content;
                glassPanel.classList.add('active');
                glassPanel.scrollTop = 0; 
            }
        });

        let targetStarRotX = 0;
        let targetStarRotY = 0;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            targetStarRotY = mouse.x * 0.2; 
            targetStarRotX = mouse.y * 0.2; 
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.position.z = window.innerWidth < 768 ? 9 : 6; 
        });

        const popSpeed = 0.15; 
        let currentlyHoveredFace = null;

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            starMesh.rotation.x += (targetStarRotX - starMesh.rotation.x) * 0.05;
            starMesh.rotation.y += (targetStarRotY - starMesh.rotation.y) * 0.05;
            starMesh.rotation.z += 0.0001; 

            const time = Date.now() * 0.003;

            if (introScreen.classList.contains('fade-out') && !glassPanel.classList.contains('active')) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(planeMeshes);

                if (intersects.length > 0) {
                    currentlyHoveredFace = intersects[0].object.userData.index;
                } else {
                    currentlyHoveredFace = null;
                }
            } else {
                currentlyHoveredFace = null;
            }

            const baseInvertValue = isDarkMode ? 0.0 : 1.0;
            const hoverInvertValue = isDarkMode ? 1.0 : 0.0;

            planeMeshes.forEach((mesh) => {
                const pulseAmount = (Math.sin(time + mesh.userData.index * 0.5) + 1.0) * 0.04;
                
                const dynamicBasePos = mesh.userData.basePos.clone().add(
                    mesh.userData.basePos.clone().normalize().multiplyScalar(pulseAmount)
                );

                let currentTargetInvert;

                if (mesh.userData.index === currentlyHoveredFace) {
                    mesh.position.lerp(mesh.userData.hoverPos, popSpeed);
                    currentTargetInvert = hoverInvertValue; 
                } else {
                    mesh.position.lerp(dynamicBasePos, popSpeed);
                    currentTargetInvert = baseInvertValue; 
                }

                if(mesh.material.userData.uInvert) {
                    mesh.material.userData.uInvert.value += (currentTargetInvert - mesh.material.userData.uInvert.value) * 0.1;
                }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
