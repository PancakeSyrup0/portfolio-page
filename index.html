<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam | Interactive Portfolio</title>
    <style>
        /* Base Styles */
        body { margin: 0; overflow: hidden; background-color: #111; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* 1. Intro Screen & Typing Animation */
        #intro-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        /* Container for typing animation */
        .typing-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #intro-screen h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            overflow: hidden; /* Ensures the content is not revealed until the animation */
            border-right: .15em solid orange; /* The typwriter cursor */
            white-space: nowrap; /* Keeps the content on a single line */
            margin: 0 auto; /* Gives that scrolling effect as the typing happens */
            
            /* The typing animation logic */
            animation: 
                typing 1.5s steps(15, end),
                blink-caret .75s step-end infinite;
        }

        /* Typing effect keyframes */
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        /* The typewriter cursor effect */
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: orange; }
        }

        #intro-screen p { 
            font-size: 1.2rem; 
            color: #aaa; 
            opacity: 0;
            animation: fadeIn 0.5s ease-in 1.5s forwards; /* Fades in after typing completes */
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* Class to trigger the fade-out */
        .fade-out { opacity: 0; visibility: hidden; }

        /* Small helper text */
        #helper-text { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none; opacity: 0.5; z-index: 10; }

        /* 2. Modal (Pop-out) Styles - Glassmorphism look */
        #modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }
        #modal-overlay.active { opacity: 1; visibility: visible; }

        #modal-content {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 40px;
            width: 80%;
            max-width: 500px;
            text-align: left;
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        #modal-overlay.active #modal-content { transform: translateY(0); }

        #close-btn {
            position: absolute;
            top: 15px; right: 20px;
            background: none; border: none; color: white;
            font-size: 1.5rem; cursor: pointer; transition: color 0.2s;
        }
        #close-btn:hover { color: #ff595e; }
        
        #modal-title { margin-top: 0; font-size: 2rem; border-bottom: 2px solid #555; padding-bottom: 10px; }
        .project-item { margin-top: 20px; }
        .project-item h3 { margin-bottom: 5px; color: #ffca3a; }
        .project-item p { line-height: 1.5; color: #ddd; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="typing-container">
            <h1>Hi, I'm Adam.</h1>
            <p>Welcome to my interactive portfolio.</p>
        </div>
    </div>

    <div id="helper-text">Drag to rotate • Click a face to explore</div>

    <div id="modal-overlay">
        <div id="modal-content">
            <button id="close-btn">&times;</button>
            <h2 id="modal-title">Skill Title</h2>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- 1. INTRO SCREEN LOGIC ---
        // Fade out the intro screen after typing animation completes + small delay
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro-screen').classList.add('fade-out');
            }, 3000); // 1.5s typing + 0.5s fadeIn + 1s delay
        };

        // --- 2. PORTFOLIO DATA ---
        // Match the array order to the cube's faces: [Right, Left, Top, Bottom, Front, Back]
        const portfolioData = [
            {
                title: "App Development", // Right face
                content: "<div class='project-item'><h3>Roomio</h3><p>Details about Roomio...</p></div>"
            },
            {
                title: "Design", // Left face
                content: "<div class='project-item'><h3>@pancakesyrup101</h3><p>Details about design work...</p></div>"
            },
            {
                title: "Video Editing", // Top face
                content: "<div class='project-item'><h3>@pancakesyrup101</h3><p>Details about video projects...</p></div>"
            },
            {
                title: "Game Development", // Bottom face
                content: "<div class='project-item'><h3>Tug of Love</h3><p>Details about Tug of Love...</p></div>"
            },
            {
                title: "Full-Stack Web Dev", // Front face
                content: "<div class='project-item'><h3>Magis FLOW</h3><p>Details about Magis FLOW...</p></div>"
            },
            {
                title: "Contact Me", // Back face
                content: "<div class='project-item'><h3>Let's Connect</h3><p>Email: adam@example.com</p></div>"
            }
        ];

        // --- 3. THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BoxGeometry(2, 2, 2);

        // --- Image Loading Logic ---
        const textureLoader = new THREE.TextureLoader();

        // This creates an array of textures. Update filenames here.
        // Make sure these files exist in the same folder as this HTML file.
        const materials = [
            new THREE.MeshBasicMaterial({ map: textureLoader.load('app_dev.png') }),    // Right
            new THREE.MeshBasicMaterial({ map: textureLoader.load('design.png') }),     // Left
            new THREE.MeshBasicMaterial({ map: textureLoader.load('video_editing.png') }), // Top
            new THREE.MeshBasicMaterial({ map: textureLoader.load('game_dev.png') }),   // Bottom
            new THREE.MeshBasicMaterial({ map: textureLoader.load('web_dev.png') }),    // Front
            new THREE.MeshBasicMaterial({ map: textureLoader.load('contact.png') })     // Back
        ];
        
        const cube = new THREE.Mesh(geometry, materials);
        scene.add(cube);
        camera.position.z = 5;

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = false; 

        // --- 4. INTERACTION LOGIC (Raycaster & Modal) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        const modalOverlay = document.getElementById('modal-overlay');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const closeBtn = document.getElementById('close-btn');

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        closeBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        window.addEventListener('click', (event) => {
            if (modalOverlay.classList.contains('active')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(cube);

            if (intersects.length > 0) {
                const faceIndex = Math.floor(intersects[0].faceIndex / 2);
                
                modalTitle.innerText = portfolioData[faceIndex].title;
                modalBody.innerHTML = portfolioData[faceIndex].content;
                
                modalOverlay.classList.add('active');
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 5. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            cube.rotation.x += 0.002;
            cube.rotation.y += 0.003;

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
